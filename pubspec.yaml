name: cody
description: Cody - A competitive programming mobile app
publish_to: 'none'
version: 1.5.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Fonts
  google_fonts: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (XP, streaks, solved problems, code drafts)
  shared_preferences: 2.2.3

  # Animations
  flutter_animate: ^4.5.0

  # UUID for submission IDs
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6
  http: ^1.2.0

  # Supabase (Auth + Database + Leaderboard)
  supabase_flutter: ^2.5.0
  url_launcher: ^6.3.0

  # Splash intro video
  video_player: ^2.9.1
  chewie: ^1.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/Allen.JPG

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FDFDFF"
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FDFDFF"
  image: "assets/app_icon.png"
  color_dark: "#0F0F12"
  image_dark: "assets/app_icon.png"
  android_gravity: center
  android_12:
    image: "assets/app_icon.png"
    color: "#FDFDFF"
    icon_background_color: "#FDFDFF"
    image_dark: "assets/app_icon.png"
    color_dark: "#0F0F12"

dependency_overrides:
  path_provider_foundation: 2.3.2
  shared_preferences_foundation: 2.3.5
